<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapWorth</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#fff200,#ffd000);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
width:380px;
max-width:100%;
border-radius:25px;
padding:35px;
box-shadow:0 20px 60px rgba(0,0,0,.15);
text-align:center;
animation:fade .7s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
font-size:55px;
}

h1{
margin-top:10px;
font-size:32px;
}

.sub{
color:#777;
margin:10px 0 25px;
}

input{
width:100%;
padding:18px;
font-size:22px;
border:none;
background:#f5f5f5;
border-radius:15px;
outline:none;
text-align:center;
}

button{
margin-top:18px;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:black;
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

.result{
margin-top:35px;
display:none;
}

.money{
font-size:48px;
font-weight:700;
color:#19b400;
margin:15px 0;
}

.note{
color:#666;
font-size:14px;
margin-top:15px;
}

.share{
margin-top:25px;
background:#fff200;
color:black;
}

.footer{
margin-top:30px;
font-size:12px;
color:#888;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">👻</div>

<h1>SnapWorth</h1>

<p class="sub">
Turn your Snapchat Score into Money
</p>

<input
type="number"
id="score"
placeholder="Enter Snapchat Score">

<button onclick="calculate()">
Calculate
</button>

<div class="result" id="result">

<h3>Your Estimated Worth</h3>

<div class="money" id="money">$0.00</div>

<p class="note">
If Snapchat paid <b>1 cent</b> per point 😂
</p>

<button class="share">
Share Result
</button>

</div>

<div class="footer">
For entertainment purposes only.
</div>

</div>

<script>

function animateValue(start,end,duration){

let current=start;

let range=end-start;

let increment=end>start?1:-1;

let step=Math.abs(Math.floor(duration/range));

step=isFinite(step)?Math.max(step,1):20;

let obj=document.getElementById("money");

let timer=setInterval(()=>{

current+=increment*(range/100);

if((increment>0&&current>=end)||(increment<0&&current<=end)){
current=end;
clearInterval(timer);
}

obj.innerHTML="$"+current.toLocaleString(undefined,{
minimumFractionDigits:2,
maximumFractionDigits:2
});

},20);

}

function calculate(){

let score=parseInt(document.getElementById("score").value);

if(!score||score<=0){
alert("Enter your Snapchat Score");
return;
}

let worth=score*0.01;

document.getElementById("result").style.display="block";

animateValue(0,worth,1500);

}

</script>

</body>
</html>
